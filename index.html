<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAussprache - জার্মান উচ্চারণ ও শব্দার্থ</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', SolaimanLipi, sans-serif;
        }
        body {
            background-color: #f7f9fa;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        nav {
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #1a252f;
        }
        .logo span { color: #d9534f; }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-menu a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
        }
        .hamburger {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #eef5f9 0%, #e0eef6 100%);
            padding: 40px 0;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }
        .hero-content h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #111;
        }
        .hero-content p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 20px;
        }
        .hero-avatar {
            font-size: 80px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Feature Cards Grid */
        .grid-section {
            padding: 40px 0;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1max);
            gap: 20px;
        }
        /* Desktop & Mobile Responsive Grid setup */
        @media (min-width: 769px) {
            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr); /* ২x২ গ্রিড ফোনে */
            }
        }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .card-btn {
            background: #f0f0f0;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            display: inline-block;
            width: 80%;
            transition: background 0.2s;
        }

        /* Card Color Profiles */
        .card-greetings .card-icon { color: #2ecc71; }
        .card-greetings { border-top: 5px solid #2ecc71; }
        .card-greetings:hover .card-btn { background: #2ecc71; color: #fff; }

        .card-a1 .card-icon { color: #f39c12; }
        .card-a1 { border-top: 5px solid #f39c12; }
        .card-a1:hover .card-btn { background: #f39c12; color: #fff; }

        .card-a2 .card-icon { color: #e74c3c; }
        .card-a2 { border-top: 5px solid #e74c3c; }
        .card-a2:hover .card-btn { background: #e74c3c; color: #fff; }

        .card-b1 .card-icon { color: #3498db; }
        .card-b1 { border-top: 5px solid #3498db; }
        .card-b1:hover .card-btn { background: #3498db; color: #fff; }

        /* Sample & Practice Section */
        .practice-section {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-bottom: 5px;
        }
        .practice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .practice-container {
                grid-template-columns: 1fr;
            }
        }
        .sample-list h4, .search-box-sec h4 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #1a252f;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .word-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .word-german {
            font-weight: bold;
            color: #333;
        }
        .word-bangla {
            color: #666;
        }
        .audio-btn {
            background: #fff;
            border: 1px solid #ddd;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            transition: all 0.2s;
        }
        .audio-btn:hover {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }

        /* Search & Voice Box */
        .search-area {
            position: relative;
            margin-bottom: 20px;
        }
        .search-area input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-area input:focus {
            border-color: #3498db;
        }
        .mic-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            color: #e74c3c;
            cursor: pointer;
        }

        /* Responsive Mobile Specific overrides */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 1.7rem; }
            .nav-menu { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="container nav-container">
            <div class="logo">Deutsch<span>Aussprache</span></div>
            <ul class="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Search</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="hamburger"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container hero-content">
            <div class="hero-avatar">👨‍🏫</div>
            <h1>জার্মান উচ্চারণ ও শব্দার্থের জগতে স্বাগতম!</h1>
            <p>সহজে সঠিক উচ্চারণ শুনুন এবং লেভেল অনুযায়ী প্র্যাকটিস করুন।</p>
        </div>
    </header>

    <!-- 4 Main Feature Cards -->
    <section class="grid-section">
        <div class="container cards-grid">
            
            <!-- Greetings Card -->
            <div class="card card-greetings" onclick="alert('Greetings সেকশনটি লোড হচ্ছে...')">
                <div class="card-icon"><i class="fa-solid fa-comments"></i></div>
                <h3>Greetings</h3>
                <p>অভিবাদন ও সাধারণ কথাবার্তা</p>
                <span class="card-btn">Play</span>
            </div>

            <!-- A1 Card -->
            <div class="card card-a1" onclick="alert('Level A1 সেকশনটি লোড হচ্ছে...')">
                <div class="card-icon"><i class="fa-solid fa-seedling"></i></div>
                <h3>Level A1</h3>
                <p>প্রাথমিক স্তর (A1)</p>
                <span class="card-btn">Go</span>
            </div>

            <!-- A2 Card -->
            <div class="card card-a2" onclick="alert('Level A2 সেকশনটি লোড হচ্ছে...')">
                <div class="card-icon"><i class="fa-solid fa-rocket"></i></div>
                <h3>Level A2</h3>
                <p>মাধ্যমিক স্তর (A2)</p>
                <span class="card-btn">Play</span>
            </div>

            <!-- B1 Card -->
            <div class="card card-b1" onclick="alert('Level B1 সেকশনটি লোড হচ্ছে...')">
                <div class="card-icon"><i class="fa-solid fa-user-graduate"></i></div>
