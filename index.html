            <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAussprache - অবিকল মোবাইল লেআউট</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Google Fonts for Premium Look -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* Global & Reset Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
        }
        body {
            background-color: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        /* Container simulating the exact Phone Screen width */
        .phone-wrapper {
            width: 100%;
            max-width: 412px; /* Standard Mobile Width */
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .hamburger-icon {
            font-size: 22px;
            color: #2ecc71; /* Exact Green tone from image */
            cursor: pointer;
        }

        /* Hero Banner Section */
        .hero-banner {
            background: #eef9f6; /* Soft greenish pastel bg */
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            border-bottom: 1px solid #e2f3ee;
        }
        .hero-graphics {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #ffcc00; /* Flag yellow border element */
        }
        .hero-text {
            flex: 1;
        }
        .hero-text h1 {
            font-size: 19px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a252f;
        }

        /* 2x2 Feature Grid Section */
        .grid-container {
            padding: 20px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* Card Styles to Match Image 100% */
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); /* Exact Soft Depth Shadow */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s;
            text-decoration: none;
            cursor: pointer;
            height: 175px;
        }
        .card:active {
            transform: scale(0.97);
        }
        .icon-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .card h3 {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .card p {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Pill Shape Action Button inside Cards */
        .action-btn {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 5px 22px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #444;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            width: 75%;
            text-align: center;
        }

        /* Specific Colors matching your exact picture */
        /* Greetings - Soft Green */
        .card-greetings h3 { color: #27ae60; }
        .card-greetings p { color: #2ecc71; }
        .card-greetings .icon-circle { color: #2ecc71; }
        
        /* A1 - Soft Orange */
        .card-a1 h3 { color: #d35400; }
        .card-a1 p { color: #e67e22; }
        .card-a1 .icon-circle { color: #e67e22; }

        /* A2 - Soft Red */
        .card-a2 h3 { color: #c0392b; }
        .card-a2 p { color: #e74c3c; }
        .card-a2 .icon-circle { color: #e74c3c; }

        /* B1 - Soft Blue */
        .card-b1 h3 { color: #2980b9; }
        .card-b1 p { color: #3498db; }
        .card-b1 .icon-circle { color: #3498db; }


        /* Bottom Course Material List Section */
        .course-material-sec {
            padding: 0 20px 20px 20px;
        }
        .sec-title {
            font-size: 15px;
            font-weight: 700;
            color: #222;
            margin-bottom: 12px;
        }
        .material-box {
            background: #fdfefe;
            border: 1px solid #eceff1;
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .word-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f3f4;
        }
        .word-item:last-child {
            border-bottom: none;
        }
        .left-content {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .ger-word {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            width: 60px;
        }
        .bn-word {
            font-size: 14px;
            color: #515a6e;
            font-weight: 500;
        }
        .volume-icon-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            font-size: 15px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }
        .volume-icon-btn:hover {
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <!-- Phone Wrapper Context Container -->
    <div class="phone-wrapper">
        
        <!-- Navbar -->
        <header class="navbar">
            <div class="brand-name">DeutschAussprache</div>
            <div class="hamburger-icon"><i class="fa-solid fa-bars"></i></div>
        </header>

        <!-- Hero Section Banner -->
        <section class="hero-banner">
            <div class="hero-graphics">👨‍音</div>
            <div class="hero-text">
                <h1>জার্মান উচ্চারণ ও শব্দার্থের জগতে স্বাগতম!</h1>
            </div>
        </section>

        <!-- Main 2x2 Grid -->
        <main class="grid-container">
            <div class="cards-grid">
                
                <!-- Card 1: Greetings -->
                <div class="card card-greetings" onclick="playAudioText('Hallo! Wie geht es dir?')">
                    <div class="icon-circle"><i class="fa-solid fa-users"></i></div>
                    <h3>Greetings</h3>
                    <p>অভিবাদন</p>
                    <div class="action-btn">Play</div>
                </div>

                <!-- Card 2: A1 -->
                <div class="card card-a1" onclick="alert('Level A1 সেকশনে নিয়ে যাওয়া হচ্ছে...')">
                    <div class="icon-circle"><i class="fa-solid fa-seedling"></i></div>
                    <h3>Level A1</h3>
                    <p>প্রাথমিক স্তর (A1)</p>
                    <div class="action-btn">Go</div>
                </div>

                <!-- Card 3: A2 -->
                <div class="card card-a2" onclick="playAudioText('Guten Tag, wie kann ich helfen?')">
                    <div class="icon-circle"><i class="fa-solid fa-rocket"></i></div>
                    <h3>Level A2</h3>
                    <p>মাধ্যমিক স্তর (A2)</p>
                    <div class="action-btn">Play</div>
                </div>

                <!-- Card 4: B1 -->
                <div class="card card-b1" onclick="alert('Level B1 সেকশনে নিয়ে যাওয়া হচ্ছে...')">
                    <div class="icon-circle"><i class="fa-solid fa-user-graduate"></i></div>
                    <h3>Level B1</h3>
                    <p>উচ্চ-মাধ্যমিক স্তর (B1)</p>
                    <div class="action-btn">Go</div>
                </div>

            </div>
        </main>

        <!-- Bottom Lists (Sample Course Material A1) -->
        <section class="course-material-sec">
            <div class="sec-title">Sample Course Material A1</div>
            
            <div class="material-box">
                <!-- Item 1 -->
                <div class="word-item">
                    <div class="left-content">
                        <span class="ger-word">Hallo</span>
                        <button class="volume-icon-btn" onclick="playAudioText('Hallo')"><i class="fa-solid fa-volume-high"></i></button>
                        <span class="bn-word">হ্যালো</span>
                    </div>
                </div>

                <!-- Item 2 -->
