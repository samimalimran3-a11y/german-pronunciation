                        
            <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAussprache</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Mobile Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-height: 100vh;
        }

        /* Homepage Image */
        .homepage-img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Menu Button Trigger Area Over Image */
        .menu-trigger {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        /* Translator Dropdown Menu */
        .lang-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 12px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 170px;
            z-index: 100;
            overflow: hidden;
        }

        .lang-dropdown.show {
            display: block;
        }

        .lang-title {
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            text-transform: uppercase;
        }

        .lang-option {
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lang-option:hover {
            background: #f1f5f9;
        }

        .lang-option.active {
            color: #16a34a;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Transparent Clickable Button over top right Menu -->
        <button class="menu-trigger" onclick="toggleMenu()" aria-label="Open Menu"></button>

        <!-- Language Menu -->
        <div class="lang-dropdown" id="langMenu">
            <div class="lang-title" id="menuTitle">Select Language</div>
            <div class="lang-option active" id="opt-bn" onclick="setLanguage('bn')">
                <span>🇧🇩 বাংলা</span>
            </div>
            <div class="lang-option" id="opt-en" onclick="setLanguage('en')">
                <span>🇬🇧 English</span>
            </div>
            <div class="lang-option" id="opt-de" onclick="setLanguage('de')">
                <span>🇩🇪 Deutsch</span>
            </div>
        </div>

        <!-- Your Cropped Image -->
        <img src="banner.png" alt="DeutschAussprache Homepage" class="homepage-img">
    </div>

<script>
function toggleMenu() {
    const menu = document.getElementById('langMenu');
    menu.classList.toggle('show');
}

document.addEventListener('click', function(e) {
    const menu = document.getElementById('langMenu');
    const btn = document.querySelector('.menu-trigger');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.remove('show');
    }
});

function setLanguage(lang) {
    document.querySelectorAll('.lang-option').forEach(el => el.classList.remove('active'));
    document.getElementById('opt-' + lang).classList.add('active');
    toggleMenu();
}
</script>

</body>
</html>
